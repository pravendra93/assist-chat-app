name: CI/CD Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to GHCR (use built-in token)
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Build image
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/chat-api:latest .

      # 4. Push image
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository }}/chat-api:latest

      # 5. Deploy to DO via SSH
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd assist-chat-app

            # Pull latest images defined in docker-compose.yml
            docker compose pull

            # Recreate containers with new image and force update
            docker compose up -d --force-recreate

            # Cleanup old images to save disk space
            docker image prune -f