name: CI/CD Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Build & Push (FIXED NAMING)
      - name: Build & Push Docker Image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/chat-api

          docker build -t $IMAGE:${{ github.sha }} .
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest

          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # 4. Sanity Gate (CRITICAL)
      - name: Verify Image Exists
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/chat-api
          docker pull $IMAGE:latest

      # 5. Deploy via SSH
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            IMAGE=ghcr.io/${{ github.repository_owner }}/chat-api

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd assist-chat-app

            # 🔒 Sanity Gate on server
            docker pull $IMAGE:latest

            # Pull all images defined in compose
            docker compose pull

            # Recreate containers safely
            docker compose up -d

            # 🧪 Basic health check (adjust endpoint if needed)
            sleep 5
            curl -f http://localhost:8001/health || exit 1

            # Cleanup old images
            docker image prune -f